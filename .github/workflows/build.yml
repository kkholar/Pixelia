name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            ccache \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre
          
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Setup Android SDK
        run: |
          # SDK'yı buildozer'ın beklediği yere kur
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          cd /home/runner/.buildozer/android/platform
          
          # Command line tools indir
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          
          # Environment değişkenleri
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # SDK bileşenleri
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          
      - name: Setup Android NDK
        run: |
          cd /home/runner/.buildozer/android/platform
          
          # NDK r25c
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          
      - name: Build APK
        run: |
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: bin/*.apk
