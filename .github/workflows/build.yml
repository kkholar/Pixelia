name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            ninja-build \
            openjdk-17-jdk \
            ant \
            ccache
            
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer
          
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Pixel Editor
package.name = pixeleditor
package.domain = org.pixeleditor
source.dir = .
source.include_exts = py,png,jpg,jpeg,ttf,txt
version = 1.2
requirements = python3, pygame==2.0.1
orientation = portrait
fullscreen = 1
android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.archs = arm64-v8a

[buildozer]
log_level = 2
EOF
      
      - name: Build APK
        run: |
          # Temizlik
          rm -rf ~/.buildozer
          rm -rf .buildozer
          
          # Build
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: bin/*.apk          # Buildozer container'ını çalıştır
          docker run --rm \
            -v $PWD:/home/user/workspace \
            -v $PWD/.buildozer:/home/user/.buildozer \
            -w /home/user/workspace \
            --user user \
            kivy/buildozer:latest \
            android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: bin/*.apk
        if-no-files-found: warn
