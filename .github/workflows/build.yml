name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
          pip install git+https://github.com/kivy/python-for-android.git@master

      - name: Setup SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # Önce build başlat, SDL dosyaları oluştuğunda patch et
          buildozer android debug 2>&1 &
          BUILD_PID=$!
          # SDL dosyası oluşana kadar bekle ve patch et
          for i in $(seq 1 60); do
            sleep 5
            SDL_FILE=$(find /home/runner/work -name "SDL_androidsensor.c" 2>/dev/null | head -1)
            if [ -n "$SDL_FILE" ]; then
              echo "Found and patching: $SDL_FILE"
              sed -i 's/ALooper_pollAll(0,/ALooper_pollOnce(0,/g' "$SDL_FILE"
              break
            fi
          done
          wait $BUILD_PID || true
          # Tekrar build
          yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor
          path: bin/*.apk
