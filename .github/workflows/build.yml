name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            ccache \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre \
            ant \
            expect  # expect'i ekledik (otomatik lisans için)
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Clean old builds
        run: |
          rm -rf /home/runner/.buildozer
          rm -rf .buildozer
          
      - name: Setup Android SDK with automatic license acceptance
        run: |
          # SDK dizinini oluştur
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          cd /home/runner/.buildozer/android/platform/android-sdk
          
          # Command line tools indir
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # Buildozer'ın beklediği yapıyı oluştur
          mkdir -p tools
          cp -r cmdline-tools/* tools/ 2>/dev/null || true
          
          # SDK manager'ı çalıştır ve lisansları otomatik kabul et
          export PATH=$PATH:/home/runner/.buildozer/android/platform/android-sdk/tools/bin
          
          # Lisansları otomatik kabul et (yes komutu ile)
          yes | /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses
          
          # Gerekli bileşenleri yükle
          /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "build-tools;34.0.0"
          
          # Başarılı kurulumu kontrol et
          echo "SDK Kurulumu tamamlandı."
          ls -la /home/runner/.buildozer/android/platform/android-sdk/build-tools/
          
      - name: Setup Android NDK
        run: |
          cd /home/runner/.buildozer/android/platform
          
          # NDK r25c (buildozer'ın önerdiği sürüm)
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          
          echo "NDK Kurulumu tamamlandı."
          
      - name: Build APK
        run: |
          # Environment değişkenlerini ayarla
          export ANDROID_HOME="/home/runner/.buildozer/android/platform/android-sdk"
          export ANDROID_NDK="/home/runner/.buildozer/android/platform/android-ndk-r25c"
          export PATH=$PATH:$ANDROID_HOME/tools/bin
          
          # Buildozer ile build al
          buildozer android debug
          
      - name: Find and Upload APK
        if: success() || failure()
        run: |
          echo "APK dosyaları aranıyor..."
          
          # APK'yı bul
          APK_FILES=$(find . -name "*.apk" -type f)
          
          if [ -n "$APK_FILES" ]; then
            echo "APK bulundu:"
            echo "$APK_FILES"
            mkdir -p artifacts
            cp $APK_FILES artifacts/
          else
            echo "APK bulunamadı! Dizin yapısı:"
            find . -type d | head -20
            echo "Build çıktısı:"
            ls -la bin/ 2>/dev/null || echo "bin dizini yok"
            ls -la .buildozer/ 2>/dev/null || echo ".buildozer dizini yok"
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: artifacts/*.apk
          if-no-files-found: warn            ccache \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre \
            ant \
            expect
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Clean old builds
        run: |
          rm -rf /home/runner/.buildozer
          rm -rf .buildozer
          
      - name: Accept Android SDK licenses globally
        run: |
          # Boş bir SDK dizini oluştur ve lisansları kabul et
          mkdir -p /home/runner/.android
          touch /home/runner/.android/repositories.cfg
          
          # Tüm olası lisansları kabul et
          for i in {1..10}; do
            echo "y" | sudo tee -a /home/runner/.android/licenses/accepted-licenses.txt
          done
          
      - name: Build APK
        run: |
          # Buildozer'ın kendi SDK/NDK'sını indirmesine izin ver
          buildozer android debug
        env:
          ANDROID_HOME: ""  # Boş bırak
          ANDROID_NDK: ""   # Boş bırak
          # Otomatik lisans kabulü için
          SDKMANAGER_OPTS: "--licenses --accept-all"
          
      - name: Find and Upload APK
        if: always()
        run: |
          # APK'yı bul
          find . -name "*.apk" -exec cp {} ./ \;
          mkdir -p artifacts
          cp *.apk artifacts/ 2>/dev/null || echo "APK bulunamadı"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: artifacts/*.apk
          if-no-files-found: warn            ccache \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre \
            ant
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Clean old builds
        run: |
          rm -rf /home/runner/.buildozer
          rm -rf .buildozer
          
      - name: Build APK (Buildozer SDK/NDK indirsin)
        run: |
          # Buildozer'ın kendi SDK/NDK'sını indirmesine izin ver
          buildozer android debug
        env:
          ANDROID_HOME: ""  # Boş bırak, buildozer kendi SDK'sını indirsin
          ANDROID_NDK: ""   # Boş bırak, buildozer kendi NDK'sını indirsin
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: bin/*.apk
