name: Build APK with p4a
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            ninja-build \
            openjdk-17-jdk \
            ant
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython
          pip install python-for-android
          
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
      - name: Setup Android NDK
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          
      - name: Build APK with p4a
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_NDK=$HOME/android-ndk-r25c
          export PATH=$PATH:$ANDROID_HOME/build-tools/33.0.0
          
          p4a apk \
            --private . \
            --package=org.pixeleditor.pixeleditor \
            --name "Pixel Editor" \
            --version 1.2 \
            --bootstrap=sdl2 \
            --requirements=python3,pygame \
            --arch=arm64-v8a \
            --sdk-dir $ANDROID_HOME \
            --ndk-dir $ANDROID_NDK \
            --android-api 33 \
            --minsdk 21 \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: ./*.apk
