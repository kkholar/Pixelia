name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
          pip install git+https://github.com/kivy/python-for-android.git@master

      - name: Setup SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # İlk build — dosyalar oluşsun, başarısız olacak
          buildozer android debug 2>&1 || true

          # SDL2 ALooper patch
          find /home/runner/work -name "SDL_androidsensor.c" 2>/dev/null | while read f; do
            echo "Patching ALooper: $f"
            sed -i 's/ALooper_pollAll/ALooper_pollOnce/g' "$f"
          done

          # harfbuzz hb-ft.cc patch — -Werror kaldır
          find /home/runner/work -path "*/SDL2_ttf/external/harfbuzz/src/hb-ft.cc" 2>/dev/null | while read f; do
            echo "Patching hb-ft.cc: $f"
            sed -i 's/-Werror=cast-function-type-strict//g' "$f" || true
          done

          # Android.mk dosyasından -Werror kaldır
          find /home/runner/work -path "*/SDL2_ttf/Android.mk" 2>/dev/null | while read f; do
            echo "Patching Android.mk: $f"
            sed -i 's/-Werror//g' "$f"
          done

          # Tekrar build
          yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor
          path: bin/*.apk
