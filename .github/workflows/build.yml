name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            ccache \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre \
            ant
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Clean old builds
        run: |
          rm -rf /home/runner/.buildozer
          rm -rf .buildozer
          rm -rf /home/runner/.android
          
      - name: Create Android license directories
        run: |
          # Android lisans dizinlerini oluştur
          mkdir -p /home/runner/.android
          mkdir -p /home/runner/.android/licenses
          
      - name: Accept Android SDK licenses
        run: |
          # Tüm Android lisanslarını kabul et
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > /home/runner/.android/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.android/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > /home/runner/.android/licenses/intel-android-extras-license
          echo "dbbf0764871016bb587805d2b624cfcd74a5e2b3" > /home/runner/.android/licenses/android-googletv-license
          
          # Alternatif yöntem - tüm olası lisansları kabul et
          for i in {1..10}; do
            echo "y" >> /home/runner/.android/licenses/accepted-licenses.txt
          done
          
      - name: Build APK
        run: |
          # Buildozer ile build al
          buildozer android debug || true
          
      - name: Find and Save APK
        if: always()
        run: |
          echo "APK dosyaları aranıyor..."
          
          # APK'yı bul
          APK_FILES=$(find /home/runner -name "*.apk" -type f 2>/dev/null || true)
          
          if [ -n "$APK_FILES" ]; then
            echo "APK bulundu:"
            echo "$APK_FILES"
            mkdir -p artifacts
            for apk in $APK_FILES; do
              cp "$apk" artifacts/
            done
            echo "APK_MEVCUT=true" >> $GITHUB_ENV
          else
            echo "APK bulunamadı! Dizin yapısı:"
            ls -la .buildozer/ 2>/dev/null || echo ".buildozer dizini yok"
            ls -la bin/ 2>/dev/null || echo "bin dizini yok"
            echo "APK_MEVCUT=false" >> $GITHUB_ENV
          fi
          
      - name: Upload APK
        if: env.APK_MEVCUT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: artifacts/*.apk
          
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
