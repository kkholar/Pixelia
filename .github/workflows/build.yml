name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            ninja-build \
            openjdk-17-jdk \
            ant \
            ccache
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          pip install pygame_sdl2  # Pygame_SDL2'yi yükle
          
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          
      - name: Setup Android NDK
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          
      - name: Update buildozer.spec for pygame_sdl2
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Pixel Editor
package.name = pixeleditor
package.domain = org.pixeleditor
source.dir = .
source.include_exts = py,png,jpg,jpeg,ttf,txt
version = 1.2

# Pygame_SDL2 kullan
requirements = python3, pygame_sdl2, sdl2, sdl2_image, sdl2_mixer, sdl2_ttf

orientation = portrait
fullscreen = 1
android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.archs = arm64-v8a

# SDK ve NDK yolları
android.sdk_path = $HOME/android-sdk
android.ndk_path = $HOME/android-ndk-r25c
android.ndk_version = 25c

[buildozer]
log_level = 2
EOF
          
      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_NDK=$HOME/android-ndk-r25c
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/33.0.0
          
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: bin/*.apk
