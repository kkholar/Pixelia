name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre \
            ant \
            expect
          
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Setup Android SDK (Manual)
        run: |
          # SDK dizinini oluştur
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          
          # Command line tools indir
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # Doğru dizin yapısını oluştur
          mkdir -p cmdline-tools
          mv cmdline-tools cmdline-tools/latest 2>/dev/null || true
          
          # PATH'e ekle
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
          
          # Lisansları kabul et
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Gerekli bileşenleri yükle - ÖNEMLİ: build-tools 33.0.0
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "build-tools;30.0.3"
          
          # Environment değişkenlerini ayarla
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          # Kurulumu kontrol et
          echo "Build-tools kontrolü:"
          ls -la $HOME/android-sdk/build-tools/ || echo "build-tools dizini yok"
          
      - name: Setup Android NDK
        run: |
          cd $HOME
          
          # NDK r25c
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          
          # NDK environment
          echo "ANDROID_NDK=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r25c" >> $GITHUB_PATH
          
      - name: Update buildozer.spec
        run: |
          # buildozer.spec'i güncelle
          cat > buildozer.spec << 'EOF'
[app]
title = Pixel Editor
package.name = pixeleditor
package.domain = org.pixeleditor
source.dir = .
source.include_exts = py,png,jpg,jpeg,ttf,txt
version = 1.2
requirements = python3, pygame
orientation = portrait
fullscreen = 1
android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.archs = arm64-v8a

# SDK ve NDK yollarını kaldır - buildozer kendi bulsun
# android.sdk_path = 
# android.ndk_path = 

[buildozer]
log_level = 2
EOF
          
      - name: Build APK
        run: |
          # Buildozer'ın SDK'yı bulması için environment
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_NDK=$HOME/android-ndk-r25c
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/33.0.0
          
          # Build
          buildozer android debug
          
      - name: Find and Upload APK
        if: always()
        run: |
          echo "APK dosyaları aranıyor..."
          
          # APK'yı bul
          APK_FILES=$(find $HOME -name "*.apk" -type f 2>/dev/null || true)
          
          if [ -n "$APK_FILES" ]; then
            echo "APK bulundu:"
            echo "$APK_FILES"
            mkdir -p artifacts
            for apk in $APK_FILES; do
              cp "$apk" artifacts/
            done
            echo "APK_MEVCUT=true" >> $GITHUB_ENV
          else
            echo "APK bulunamadı!"
            echo "Build çıktısı:"
            ls -la bin/ 2>/dev/null || echo "bin dizini yok"
            ls -la .buildozer/ 2>/dev/null || echo ".buildozer dizini yok"
          fi
          
      - name: Upload APK
        if: env.APK_MEVCUT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: artifacts/*.apk
