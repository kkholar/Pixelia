name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            ccache \
            ninja-build \
            openjdk-17-jdk \
            openjdk-17-jre \
            ant
            
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          
      - name: Clean old builds
        run: |
          rm -rf /home/runner/.buildozer
          rm -rf .buildozer
          
      - name: Build APK (Buildozer SDK/NDK indirsin)
        run: |
          # Buildozer'ın kendi SDK/NDK'sını indirmesine izin ver
          buildozer android debug
        env:
          ANDROID_HOME: ""  # Boş bırak, buildozer kendi SDK'sını indirsin
          ANDROID_NDK: ""   # Boş bırak, buildozer kendi NDK'sını indirsin
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-editor-apk
          path: bin/*.apk
