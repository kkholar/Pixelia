- name: Create buildozer.spec with stable pygame
  run: |
    cat > buildozer.spec << 'EOF'
[app]
title = Pixel Editor
package.name = pixeleditor
package.domain = org.pixeleditor
source.dir = .
source.include_exts = py,png,jpg,jpeg,ttf,txt
version = 1.2

# Eski ama kararlı pygame sürümü
requirements = python3, pygame==2.0.1, sdl2==2.0.20

orientation = portrait
fullscreen = 1
android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.archs = arm64-v8a

# Özel p4a branch'i
p4a.branch = develop

[buildozer]
log_level = 2
EOF
